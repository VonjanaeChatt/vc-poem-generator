<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> AI Poem Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/typewriter-effect@2.18.0/dist/core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Poem Generator</h1>
    </header>
    <main>
      <form id="poem-form">
        <input type="text" id="input" placeholder="Enter poem topic..." class="instructions" required autocomplete="off"/>
        <input type="submit" class="submit"/>
      </form>
      <div id="poem"></div>
    </main>
    <footer>
      This project was coded by 
      <a href="https://www.linkedin.com/in/vonjanae-chatt-27a154161/" target="_blank">Vonjanae Chatt</a>, 
      open-sourced on 
      <a href="https://github.com/VonjanaeChatt/vc-poem-generator" target="_blank">Github</a>, 
      and Hosted on 
      <a href="https://vcpoem.netlify.app/" target="_blank">Netlify</a>
    </footer>
  </div>
  <script src="index.js"></script>
</body>
</html>
